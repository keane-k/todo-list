<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>To-Do List</title>
    <!-- Connect HTML and CSS file -->
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <div class="container">
        <div class="todo-app">
            <!-- Add Title accompanied with an image-->
            <h2>To-Do List <img src="destiny-icon.png"/></h2>
            
            <!-- Add Search Box and 'Add' Button to add task -->
            <div class="row">
                <!-- Adding Search Box that allows user to write -->
                <input type="text" id="input-box" placeholder="Add your text">
                <!-- Adding 'Add' Button -->
                 <button onclick="addTask()">Add</button>
            </div>
            
            <!-- Add user input into a list (using ul - unordered list) -->
            <ul id="list-container">
                <!-- Add list items -->
                <!-- <li class="checked">Task 1</li>
                <li>Task 2</li>
                <li>Task 3</li> -->
            </ul>
        </div>
    </div>
    
    <!-- Reference Javascript to script.js -->
    <script src="script.js"></script>

</body>
</html>
